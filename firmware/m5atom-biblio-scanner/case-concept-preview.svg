<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f5f1e8"/>
      <stop offset="100%" stop-color="#e6edf2"/>
    </linearGradient>
    <linearGradient id="body" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#31343a"/>
      <stop offset="100%" stop-color="#1f2227"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#ffcc33"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1200" height="760" fill="url(#bg)"/>

  <text x="60" y="70" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" fill="#1f2937">
    Concepto de Case 3D - Scanner Biblioteca
  </text>
  <text x="60" y="105" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#475569">
    Propuesta: handheld wedge modular con powerbank trasera y canal oculto para cable corto
  </text>

  <g transform="translate(60,150)" filter="url(#shadow)">
    <text x="130" y="-20" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">Vista lateral</text>
    <path d="M40 320 L110 70 Q120 50 145 50 L285 50 Q315 50 330 85 L365 170 Q378 198 378 230 L378 318 Q378 340 360 340 L65 340 Q40 340 40 320 Z" fill="url(#body)"/>
    <path d="M105 70 Q120 30 160 30 L290 30 Q330 30 348 80 L358 108 L130 108 Z" fill="url(#accent)"/>
    <rect x="128" y="118" rx="12" ry="12" width="192" height="46" fill="#dbeafe" opacity="0.95"/>
    <rect x="136" y="134" rx="4" ry="4" width="176" height="14" fill="#ef4444"/>
    <rect x="98" y="190" rx="12" ry="12" width="240" height="26" fill="#334155"/>
    <rect x="82" y="226" rx="16" ry="16" width="274" height="92" fill="#b91c1c" opacity="0.9"/>
    <text x="150" y="98" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#1f2937">scanner + atom</text>
    <text x="145" y="208" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#e2e8f0">canal interno cable USB</text>
    <text x="172" y="278" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#fff5f5">powerbank</text>
    <text x="390" y="108" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#334155">scanner inclinado</text>
    <line x1="332" y1="90" x2="450" y2="90" stroke="#334155" stroke-width="2"/>
    <text x="390" y="210" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#334155">espacio para cable corto</text>
    <line x1="320" y1="202" x2="465" y2="202" stroke="#334155" stroke-width="2"/>
    <text x="390" y="288" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#334155">bateria desmontable</text>
    <line x1="335" y1="278" x2="475" y2="278" stroke="#334155" stroke-width="2"/>
  </g>

  <g transform="translate(620,150)" filter="url(#shadow)">
    <text x="120" y="-20" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">Vista frontal</text>
    <rect x="70" y="20" rx="28" ry="28" width="280" height="330" fill="url(#body)"/>
    <rect x="108" y="50" rx="20" ry="20" width="204" height="112" fill="url(#accent)"/>
    <rect x="132" y="76" rx="12" ry="12" width="156" height="52" fill="#dbeafe"/>
    <rect x="144" y="98" rx="5" ry="5" width="132" height="8" fill="#ef4444"/>
    <circle cx="210" cy="205" r="10" fill="#22c55e"/>
    <rect x="150" y="250" rx="10" ry="10" width="120" height="28" fill="#475569"/>
    <rect x="160" y="286" rx="8" ry="8" width="100" height="12" fill="#f8fafc" opacity="0.85"/>
    <text x="120" y="390" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#334155">frente limpio con ventana QR</text>
  </g>

  <g transform="translate(620,490)" filter="url(#shadow)">
    <text x="118" y="-20" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">Vista trasera</text>
    <rect x="70" y="10" rx="28" ry="28" width="280" height="180" fill="url(#body)"/>
    <rect x="98" y="34" rx="18" ry="18" width="224" height="132" fill="#991b1b"/>
    <rect x="114" y="54" rx="6" ry="6" width="40" height="10" fill="#fca5a5"/>
    <rect x="266" y="54" rx="6" ry="6" width="34" height="10" fill="#fca5a5"/>
    <g fill="#94a3b8" opacity="0.9">
      <rect x="118" y="136" rx="3" ry="3" width="18" height="5"/>
      <rect x="142" y="136" rx="3" ry="3" width="18" height="5"/>
      <rect x="166" y="136" rx="3" ry="3" width="18" height="5"/>
      <rect x="190" y="136" rx="3" ry="3" width="18" height="5"/>
      <rect x="214" y="136" rx="3" ry="3" width="18" height="5"/>
      <rect x="238" y="136" rx="3" ry="3" width="18" height="5"/>
      <rect x="262" y="136" rx="3" ry="3" width="18" height="5"/>
    </g>
    <text x="102" y="218" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#334155">tapa posterior + acceso a puertos</text>
  </g>

  <g transform="translate(55,620)">
    <text x="0" y="0" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#111827">Notas de diseno</text>
    <text x="0" y="34" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#475569">- ancho exterior sugerido: 56 mm</text>
    <text x="0" y="60" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#475569">- alto exterior sugerido: 96 mm</text>
    <text x="0" y="86" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#475569">- grosor estimado: 26 mm</text>
    <text x="0" y="112" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#475569">- pared de 2.0 mm y holgura de 0.6 mm</text>
    <text x="430" y="34" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#475569">- scanner frontal libre, sin obstruir LED ni lente</text>
    <text x="430" y="60" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#475569">- cable corto oculto en canal interno</text>
    <text x="430" y="86" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#475569">- ventilacion trasera y lateral para calor normal de uso</text>
    <text x="430" y="112" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#475569">- mejor fabricarlo modular: cabeza scanner + base powerbank</text>
  </g>
</svg>
